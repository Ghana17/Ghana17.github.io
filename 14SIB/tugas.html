<!DOCTYPE html>
<html>

<head>
    <title>Form</title>
    <style>
        .judul{
            background : gray;
            padding: 5px;
            border-radius: 10px;
		}
		.submit{
			background:gray;
			border-radius: 5px;
			padding: 0.5em;
			margin: 5px 5px 5px 45px;
			font-size: 15px;
		}
		.reset{
			background: darkgray;
			border-radius: 5px;
			padding: 0.5em;
			margin: 5px;
		
		}
		.body{
			font-size:13;
        }
        label{
            padding: 20px;
        }
        table{
            padding: 0.5em;
			margin: 5px;
            border-color: transparent;
        }
	</style>
</head>

<body>
    <center>
        <font class="judul" size="7">Menambahkan Acara Organisasi Mahasiswa Fasilkom</font>
        <hr>
    </center>

    <br><br>
    <center>
        <form method="POST" action="adminacara.html">
            <table border="1">
                <tr>
                    <td><label for="Organisasi">
                            Organisasi
                        </label></td>
                    <td><select name="Organisasi" id="Organisasi">
                            <option value="" disabled selected>Pilih Ormawa</option>
                            <option value="bem">BEM</option>
                            <option value="balwana">UKM Balwana</option>
                            <option value="binary">UKM-P Binary</option>
                            <option value="laos">UKM Laos</option>
                            <option value="macho">UKM-O Macho</option>
                            <option value="etalase">UKM-K Etalase</option>
                        </select></td>
                </tr>

                <tr>
                    <td><label for="acara">
                            Nama Acara
                        </label></td>
                    <td>
                        <textarea cols="41" rows="1" placeholder="Nama Acara"></textarea>
                    </td>
                </tr>

                <tr>
                    <td><label for="deskripsi">
                            Deskripsi Acara
                        </label></td>
                    <td>
                        <textarea cols="41" rows="5" placeholder="Deskripsi Acara"></textarea>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <button class="submit" type="submit">Simpan</button><input class="reset" type="reset" value="reset">
                    </td>
                </tr>
            </table>
        </form>
    </center><br>

</body>

</html>
